apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ip-country-api.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ip-country-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_NAME: {{ .Values.runtime.appName | quote }}
  APP_ENV: {{ .Values.runtime.appEnv | quote }}
  APP_VERSION: {{ .Values.runtime.appVersion | quote }}
  APP_HOST: {{ .Values.runtime.appHost | quote }}
  APP_PORT: {{ .Values.runtime.appPort | quote }}
  LOG_LEVEL: {{ .Values.runtime.logLevel | quote }}
  LOG_FORMAT: {{ .Values.runtime.logFormat | quote }}
  DATABASE_URL: {{ required "runtime.databaseUrl is required" .Values.runtime.databaseUrl | quote }}
  DATABASE_POOL_SIZE: {{ .Values.runtime.databasePoolSize | quote }}
  DATABASE_MAX_OVERFLOW: {{ .Values.runtime.databaseMaxOverflow | quote }}
  DATABASE_POOL_TIMEOUT_SECONDS: {{ .Values.runtime.databasePoolTimeoutSeconds | quote }}
  DATABASE_CONNECT_TIMEOUT_SECONDS: {{ .Values.runtime.databaseConnectTimeoutSeconds | quote }}
  GEOIP_PROVIDER: {{ .Values.runtime.geoipProvider | quote }}
  GEOIP_PROVIDER_BASE_URL: {{ .Values.runtime.geoipProviderBaseUrl | quote }}
  IPINFO_TOKEN: {{ required "runtime.ipinfoToken is required" .Values.runtime.ipinfoToken | quote }}
  GEOIP_PROVIDER_TIMEOUT_SECONDS: {{ .Values.runtime.geoipProviderTimeoutSeconds | quote }}
  GEOIP_PROVIDER_MAX_RETRIES: {{ .Values.runtime.geoipProviderMaxRetries | quote }}
  GEOIP_CACHE_TTL_SECONDS: {{ .Values.runtime.geoipCacheTtlSeconds | int64 | quote }}
  METRICS_ENABLED: {{ .Values.runtime.metricsEnabled | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.runtime.corsAllowedOrigins | toJson | quote }}
  TRUSTED_HOSTS: {{ .Values.runtime.trustedHosts | toJson | quote }}
