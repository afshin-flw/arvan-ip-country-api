apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ip-country-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ip-country-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "ip-country-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ip-country-api.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        # Hash only Secret data inputs. Chart metadata changes must not restart Pods.
        checksum/runtime-secret: {{ toJson .Values.runtime | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "ip-country-api.serviceAccountName" . }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  {{- include "ip-country-api.selectorLabels" . | nindent 18 }}
                  app.kubernetes.io/component: api
      containers:
        - name: api
          image: {{ include "ip-country-api.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            {{- range $name := list "APP_NAME" "APP_ENV" "APP_VERSION" "APP_HOST" "APP_PORT" "LOG_LEVEL" "LOG_FORMAT" "DATABASE_URL" "DATABASE_POOL_SIZE" "DATABASE_MAX_OVERFLOW" "DATABASE_POOL_TIMEOUT_SECONDS" "DATABASE_CONNECT_TIMEOUT_SECONDS" "GEOIP_PROVIDER" "GEOIP_PROVIDER_BASE_URL" "IPINFO_TOKEN" "GEOIP_PROVIDER_TIMEOUT_SECONDS" "GEOIP_PROVIDER_MAX_RETRIES" "GEOIP_CACHE_TTL_SECONDS" "METRICS_ENABLED" "CORS_ALLOWED_ORIGINS" "TRUSTED_HOSTS" }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "ip-country-api.secretName" $ }}
                  key: {{ $name }}
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
