apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ip-country-api.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ip-country-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  backoffLimit: {{ .Values.migration.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "ip-country-api.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: {{ include "ip-country-api.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "alembic", "upgrade", "head"]
          env:
            - name: APP_ENV
              value: {{ .Values.runtime.appEnv | quote }}
            - name: DATABASE_URL
              value: {{ required "runtime.databaseUrl is required" .Values.runtime.databaseUrl | quote }}
            - name: GEOIP_PROVIDER
              value: {{ .Values.runtime.geoipProvider | quote }}
            - name: IPINFO_TOKEN
              value: {{ required "runtime.ipinfoToken is required" .Values.runtime.ipinfoToken | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
