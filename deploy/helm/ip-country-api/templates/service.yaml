apiVersion: v1
kind: Service
metadata:
  name: {{ include "ip-country-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ip-country-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "ip-country-api.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
