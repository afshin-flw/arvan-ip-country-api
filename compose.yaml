services:
  postgres:
    image: postgres:17.6-bookworm
    environment:
      POSTGRES_DB: ip_country
      POSTGRES_USER: ip_country
      POSTGRES_PASSWORD: local-development-only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ip_country -d ip_country"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true

  migrate:
    build:
      context: .
    image: arvan-ip-country-api:local
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://ip_country:local-development-only@postgres:5432/ip_country
      GEOIP_PROVIDER: fake
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: .
    image: arvan-ip-country-api:local
    environment:
      APP_NAME: IP Country API
      APP_ENV: development
      APP_VERSION: 0.1.0
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      DATABASE_URL: postgresql+psycopg://ip_country:local-development-only@postgres:5432/ip_country
      GEOIP_PROVIDER: fake
      TRUSTED_HOSTS: '["localhost","127.0.0.1"]'
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8080:8080"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres-data:
