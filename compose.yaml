services:
  postgres:
    image: postgres:17.6-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ip_country}
      POSTGRES_USER: ${POSTGRES_USER:-ip_country}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in your shell}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  app:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
    environment:
      APP_NAME: ${APP_NAME:-IP Country API}
      APP_ENV: ${APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ip_country}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in your shell}@postgres:5432/${POSTGRES_DB:-ip_country}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-5}
      DATABASE_POOL_TIMEOUT_SECONDS: ${DATABASE_POOL_TIMEOUT_SECONDS:-5}
      DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-5}
      GEOIP_PROVIDER: ${GEOIP_PROVIDER:-ipinfo}
      GEOIP_PROVIDER_BASE_URL: ${GEOIP_PROVIDER_BASE_URL:-https://api.ipinfo.io}
      IPINFO_TOKEN: ${IPINFO_TOKEN:?set IPINFO_TOKEN in your shell}
      GEOIP_PROVIDER_TIMEOUT_SECONDS: ${GEOIP_PROVIDER_TIMEOUT_SECONDS:-3}
      GEOIP_PROVIDER_MAX_RETRIES: ${GEOIP_PROVIDER_MAX_RETRIES:-2}
      GEOIP_CACHE_TTL_SECONDS: ${GEOIP_CACHE_TTL_SECONDS:-2592000}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-[]}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-["localhost","127.0.0.1","0.0.0.0"]}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    read_only: true
    tmpfs:
      - /tmp

volumes:
  postgres-data:
