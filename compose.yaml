services:
  postgres:
    image: postgres:17.6-bookworm
    container_name: arvan-ip-country-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_ADMIN_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:?set POSTGRES_ADMIN_USER in the demo environment}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?set POSTGRES_ADMIN_PASSWORD in the demo environment}
      APP_DB_NAME: ${APP_DB_NAME:?set APP_DB_NAME in the demo environment}
      APP_DB_USER: ${APP_DB_USER:?set APP_DB_USER in the demo environment}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?set APP_DB_PASSWORD in the demo environment}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../scripts/docker-postgres-init.sh:/docker-entrypoint-initdb.d/10-app-role.sh:ro
    networks:
      - demo-network
    security_opt:
      - no-new-privileges:true

  app:
    image: ip-country-api:phase-1.5
    container_name: arvan-ip-country-api
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-IP Country API}
      APP_ENV: ${APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in the demo environment}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-5}
      DATABASE_POOL_TIMEOUT_SECONDS: ${DATABASE_POOL_TIMEOUT_SECONDS:-5}
      DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-5}
      GEOIP_PROVIDER: ${GEOIP_PROVIDER:-fake}
      GEOIP_PROVIDER_BASE_URL: ${GEOIP_PROVIDER_BASE_URL:-https://api.ipinfo.io}
      GEOIP_PROVIDER_TIMEOUT_SECONDS: ${GEOIP_PROVIDER_TIMEOUT_SECONDS:-3}
      GEOIP_PROVIDER_MAX_RETRIES: ${GEOIP_PROVIDER_MAX_RETRIES:-2}
      GEOIP_CACHE_TTL_SECONDS: ${GEOIP_CACHE_TTL_SECONDS:-2592000}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-[]}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-["localhost","127.0.0.1","0.0.0.0"]}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "0.0.0.0:${APP_PORT:-8080}:8080"
    networks:
      - demo-network
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres-data:
    name: arvan_ip_country_postgres_data

networks:
  demo-network:
    name: arvan_ip_country_network
