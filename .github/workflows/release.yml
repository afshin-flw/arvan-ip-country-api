name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version such as v0.1.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  release:
    name: Validate and publish immutable image
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17.6-bookworm@sha256:f3bd19c606e442c3d7bdfa8002e03fe260a1023351e0ea4598032022b68dd6e3
        env:
          POSTGRES_DB: ip_country_test
          POSTGRES_USER: ip_country_test
          POSTGRES_PASSWORD: isolated-release-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ip_country_test -d ip_country_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      APP_ENV: test
      GEOIP_PROVIDER: fake
      DATABASE_URL: postgresql+psycopg://ip_country_test:isolated-release-only-password@127.0.0.1:5432/ip_country_test
      TEST_DATABASE_URL: postgresql+psycopg://ip_country_test:isolated-release-only-password@127.0.0.1:5432/ip_country_test
      IMAGE_REPOSITORY: ghcr.io/afshin-flw/arvan-ip-country-api
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      # actions/setup-python v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      # astral-sh/setup-uv v6.6.1
      - uses: astral-sh/setup-uv@557e51de59eb14aaaba2ed9621916900a91d50c6
        with:
          version: "0.11.20"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Validate release identity
        id: release
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${DISPATCH_VERSION}"
          fi
          printf '%s' "$version" | grep -Eq '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$'
          tag_commit="$(git rev-parse "refs/tags/${version}^{commit}")"
          test "$tag_commit" = "$GITHUB_SHA"
          short_sha="$(git rev-parse --short=12 "$GITHUB_SHA")"
          {
            echo "version=$version"
            echo "short_sha=$short_sha"
          } >>"$GITHUB_OUTPUT"
      - name: Validate lockfile and install frozen dependencies
        run: |
          uv lock --check
          uv sync --frozen --all-groups
      - name: Run quality gates
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run mypy
          uv run pytest -m "unit or api" --cov --cov-report=term-missing
      - name: Wait for PostgreSQL
        run: |
          uv run python - <<'PY'
          import os
          import time
          import psycopg

          database_url = os.environ["TEST_DATABASE_URL"].replace(
              "postgresql+psycopg://", "postgresql://", 1
          )
          for attempt in range(30):
              try:
                  with psycopg.connect(database_url):
                      break
              except psycopg.OperationalError:
                  if attempt == 29:
                      raise
                  time.sleep(2)
          PY
      - name: Validate migrations and integration tests
        run: |
          uv run alembic upgrade head
          uv run alembic check
          uv run pytest -m integration
      # docker/setup-buildx-action v3.11.1
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435
      # docker/login-action v3.5.0
      - uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # docker/build-push-action v6.18.0
      - name: Build and publish
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ steps.release.outputs.version }}
            ${{ env.IMAGE_REPOSITORY }}:sha-${{ steps.release.outputs.short_sha }}
          build-args: |
            APP_VERSION=${{ steps.release.outputs.version }}
            OCI_SOURCE=https://github.com/${{ github.repository }}
            OCI_REVISION=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.title=IP Country API
            org.opencontainers.image.description=Cache-aside IP country lookup API backed by PostgreSQL
      - name: Release summary
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHORT_SHA: ${{ steps.release.outputs.short_sha }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "## IP Country API release"
            echo
            echo "- Release version: \`${VERSION}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Short commit: \`${SHORT_SHA}\`"
            echo "- Image repository: \`${IMAGE_REPOSITORY}\`"
            echo "- Version tag: \`${IMAGE_REPOSITORY}:${VERSION}\`"
            echo "- Commit tag: \`${IMAGE_REPOSITORY}:sha-${SHORT_SHA}\`"
            echo "- Immutable digest: \`${DIGEST}\`"
            echo "- Platform: \`linux/amd64\`"
            echo "- Python: \`3.12\`"
            echo "- Tests: unit, API, and PostgreSQL integration passed"
            echo "- Migrations: Alembic upgrade and drift check passed"
            echo "- Kubernetes deployment: not performed"
          } >>"$GITHUB_STEP_SUMMARY"
