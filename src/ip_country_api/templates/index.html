<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Look up the country associated with a public IP address.">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/app.css">
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">ArvanCloud · SRE Challenge</p>
        <h1 id="page-title">IP country lookup</h1>
        <p class="intro">Enter a public IPv4 or IPv6 address. Results are served from the persistent cache whenever possible.</p>

        <form id="lookup-form" novalidate>
          <label for="ip-address">IP address</label>
          <div class="input-row">
            <input id="ip-address" name="ip" type="text" inputmode="text" autocomplete="off" spellcheck="false" maxlength="45" placeholder="8.8.8.8" required aria-describedby="form-message">
            <button id="submit-button" type="submit"><span class="button-label">Look up</span><span class="spinner" aria-hidden="true"></span></button>
          </div>
          <p id="form-message" class="message" role="alert" aria-live="polite"></p>
        </form>
      </section>

      <section id="result" class="result" aria-labelledby="country-name" hidden>
        <div class="result-heading">
          <div>
            <p class="eyebrow">Country</p>
            <h2 id="country-name"></h2>
          </div>
          <span id="source" class="badge"></span>
        </div>
        <dl>
          <div><dt>Country code</dt><dd id="country-code"></dd></div>
          <div><dt>Normalized IP</dt><dd id="normalized-ip"></dd></div>
          <div><dt>Fetched</dt><dd id="fetched-at"></dd></div>
          <div><dt>Expires</dt><dd id="expires-at"></dd></div>
        </dl>
      </section>
    </main>
  </body>
</html>
